name: Gatsby Publish

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: set up project
        run: |
          yarn install
          gatsby build --prefix-paths && gh-pages -d public
      - uses: peaceiris/actions-gh-pages@v3.9.2
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./public