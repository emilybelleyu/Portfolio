name: Gatsby Publish

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675
      - uses: enriikke/gatsby-gh-pages-action@v2
        with:
          access-token: ${{ secrets.portfolio }}
          deploy-branch: gh-pages
          gatsby-args: --prefix-paths